services:
  llama-server:
    build:
      context: .
      dockerfile: docker/llama-server/Dockerfile
      args:
        CUDA_VERSION: ${CUDA_VERSION}
        UBUNTU_VERSION: ${UBUNTU_VERSION}
        CUDA_ARCH: ${CUDA_ARCH}
        LLAMA_CPP_REPO: ${LLAMA_CPP_REPO}
        LLAMA_CPP_REF: ${LLAMA_CPP_REF}
    image: local/llama-server-cuda:${LLAMA_CPP_REF}
    restart: unless-stopped
    ports:
      - "${LLAMA_SERVER_PUBLIC_PORT}:${LLAMA_SERVER_PORT}"
    environment:
      MODEL_DIR: /models
      MODEL_FILE: ${MODEL_FILE}
      LLAMA_SERVER_PORT: ${LLAMA_SERVER_PORT}
      LLAMA_SERVER_HOST: 0.0.0.0
      LLAMA_GPU_MODE: ${LLAMA_GPU_MODE}
      LLAMA_SERVER_ARGS_FILE: /config/llama-server.args
      LLAMA_SERVER_CPU_FALLBACK_ARGS_FILE: /config/llama-server.cpu-fallback.args
      LOG_DIR: /logs
      LLAMA_SERVER_LOG_FILE: /logs/llama-server.log
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ${MODEL_DIR}:/models:ro
      - ./config:/config:ro
      - ./logs:/logs
    gpus: all
    healthcheck:
      test: ["CMD", "/usr/local/bin/llama-server-healthcheck.sh"]
      interval: 120s
      timeout: 5s
      start_period: 10m
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

  llama-proxy:
    build:
      context: .
      dockerfile: docker/llama-proxy/Dockerfile
    image: local/llama-proxy:latest
    restart: unless-stopped
    depends_on:
      llama-server:
        condition: service_healthy
    ports:
      - "${PROXY_PORT}:8000"
    environment:
      PROXY_HOST: 0.0.0.0
      PROXY_PORT: 8000
      BACKEND_URL: http://llama-server:${LLAMA_SERVER_PORT}
      BACKEND_TIMEOUT: 600
      PROXY_LOG_LEVEL: ${PROXY_LOG_LEVEL}
      LOG_DIR: /logs
      PROXY_LOG_FILE: /logs/llama-proxy.log
    volumes:
      - ./logs:/logs
    healthcheck:
      test: ["CMD", "/usr/local/bin/llama-proxy-healthcheck.py"]
      interval: 120s
      timeout: 5s
      start_period: 20s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"
